services:

  # ── FaultSense API ──────────────────────────────────────────────────────────
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./checkpoints:/app/checkpoints   # mount trained models
      - ./data:/app/data                 # mount data if needed at runtime
    environment:
      - CHECKPOINT_DIR=/app/checkpoints
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      - mlflow
    restart: unless-stopped

  # ── MLflow tracking server ──────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    command: >
      mlflow server
        --host 0.0.0.0
        --port 5000
        --backend-store-uri sqlite:///mlflow/mlflow.db
        --default-artifact-root /mlflow/artifacts

volumes:
  mlflow_data:
